<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acclimation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="acclimation">
    <main class="page-shell">
        <section class="stage-card stage-card--timed">
            <p class="eyebrow">Stage 2</p>
            <h1>Acclimation</h1>
            <p class="stage-subtitle">
                Please wait quietly for the acclimation period. Review the instructions on screen and prepare for the baseline recording.
            </p>
            <div class="instruction-stack" id="typing-effect"></div>
            <div id="timer-shell"></div>
        </section>
    </main>

    <script src="experiment-config.js"></script>
    <script src="platform-utils.js"></script>
    <script src="dynamicText.js"></script>
    <script>
        PlatformUtils.setPageData("acclimation");
        (function () {
            document.getElementById("timer-shell").innerHTML = PlatformUtils.timerMarkup();
            const complete = function () {
                window.location.href = ExperimentConfig.routes.baseline;
            };
            const timerText = document.querySelector("[data-timer-text]");
            const timerCircle = document.querySelector(".timer-circle");
            const circumference = 2 * Math.PI * 66;
            timerCircle.style.strokeDasharray = `${circumference}`;
            timerCircle.style.strokeDashoffset = "0";
            let remaining = ExperimentConfig.timings.acclimationSeconds;
            timerText.textContent = `${remaining}s`;
            const interval = window.setInterval(function () {
                remaining -= 1;
                timerText.textContent = `${Math.max(remaining, 0)}s`;
                timerCircle.style.strokeDashoffset = `${circumference * (1 - Math.max(remaining, 0) / ExperimentConfig.timings.acclimationSeconds)}`;
                if (remaining <= 0) {
                    window.clearInterval(interval);
                    complete();
                }
            }, 1000);
        })();
    </script>
</body>
</html>

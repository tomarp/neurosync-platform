<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acclimation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="acclimation">
    <main class="page-shell"><div id="page-container"></div></main>

    <script src="experiment-config.js"></script>
    <script src="platform-utils.js"></script>
    <script>
        PlatformUtils.setPageData("acclimation");
        PlatformUtils.renderStagePage(
            document.getElementById("page-container"),
            {
                activeStage: "acclimation",
                mode: "timed",
                timer: true,
                seconds: ExperimentConfig.timings.acclimationSeconds,
                progressLabel: "Stage 2 of 8",
                eyebrow: "Acclimation",
                title: "Quiet acclimation under chromatic ambient lighting",
                subtitle: "Settle into a comfortable posture, look forward, and allow the session environment to stabilize before baseline recording begins.",
                bodyHtml: `
                    <div class="focus-field focus-field--ambient">
                        <div class="focus-ring"></div>
                        <div class="focus-ring focus-ring--secondary"></div>
                        <div class="focus-core"></div>
                    </div>
                    ${PlatformUtils.instructionListMarkup([
                        "Remain seated and minimize movement.",
                        "Keep headphones on and maintain a forward gaze.",
                        "Wait quietly until the platform advances to baseline recording."
                    ])}
                `,
                supportText: "This stage is intentionally quiet and minimal to support physiological settling.",
                skipLabel: "Skip acclimation"
            },
            function () {
                PlatformUtils.goToRoute("baseline");
            }
        );
    </script>
</body>
</html>

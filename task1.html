<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbal-Semantic Task</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="task1">
    <main class="page-shell"><div id="page-container"></div></main>

    <audio id="background-audio" loop preload="auto">
        <source src="auditoryBeats/10HzBinauralBeats.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script src="experiment-config.js"></script>
    <script src="platform-utils.js"></script>
    <script>
        PlatformUtils.setPageData("task1");
        const container = document.getElementById("page-container");
        const introPage = {
            activeStage: "task1",
            mode: "manual",
            progressLabel: "Stage 4 of 8",
            eyebrow: "Task block 1",
            title: "Verbal-semantic task under 10 Hz stimulation",
            subtitle: "The participant will hear short spoken statements and classify semantic consistency within each timed response window.",
            bodyHtml: PlatformUtils.infoCardsMarkup([
                { label: "Stimulation", value: "10 Hz binaural beat background audio." },
                { label: "Responses", value: "Select one of three consistency options for each item." },
                { label: "Pacing", value: "Each item advances automatically after the response window." }
            ]),
            supportText: "Use headphones throughout the block.",
            buttonLabel: "Begin Task Block 1"
        };

        const itemPages = ExperimentConfig.task1.audioFiles.map(function (audioSrc, index) {
            return {
                activeStage: "task1",
                mode: "timed",
                timer: true,
                seconds: ExperimentConfig.timings.taskItemSeconds,
                progressLabel: `Stage 4 of 8 • Item ${index + 1} of ${ExperimentConfig.task1.audioFiles.length}`,
                eyebrow: "Verbal-semantic item",
                title: `Audio statement ${index + 1}`,
                subtitle: "Listen to the item and choose the single response that best matches what you heard before the next trial appears.",
                mediaHtml: PlatformUtils.buildTaskMediaAudio(audioSrc, "10 Hz background stimulation remains active during this block."),
                bodyHtml: PlatformUtils.optionListMarkup(
                    `audio_q_${index + 1}`,
                    ExperimentConfig.task1.options,
                    "Use keys 1, 2, or 3 to respond."
                ),
                skipLabel: "Skip item"
            };
        });

        PlatformUtils.renderSequence(
            container,
            [introPage].concat(itemPages),
            function () {
                PlatformUtils.goToRoute("surveyPostTask1");
            },
            { backgroundAudioId: "background-audio" }
        );
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbal-Semantic Task</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="task1">
    <main class="page-shell">
        <div id="page-container"></div>
    </main>

    <audio id="background-audio" loop preload="auto">
        <source src="auditoryBeats/10HzBinauralBeats.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script src="experiment-config.js"></script>
    <script src="platform-utils.js"></script>
    <script>
        PlatformUtils.setPageData("task1");
        const container = document.getElementById("page-container");
        const pages = [
            {
                mode: "manual",
                eyebrow: "Stage 4",
                title: ExperimentConfig.task1.introTitle,
                subtitle: ExperimentConfig.task1.introBody,
                buttonLabel: "Begin Task 1",
            },
        ].concat(
            ExperimentConfig.task1.audioFiles.map(function (audioSrc, index) {
                return {
                    mode: "timed",
                    timer: true,
                    seconds: ExperimentConfig.timings.taskItemSeconds,
                    eyebrow: `Task 1 Item ${index + 1} of ${ExperimentConfig.task1.audioFiles.length}`,
                    title: `Audio Statement ${index + 1}`,
                    subtitle:
                        "Listen to the statement, replay it if needed, and select the response that best matches what you heard.",
                    mediaHtml: PlatformUtils.buildTaskMediaAudio(audioSrc, "10 Hz background stimulation continues during this task block."),
                    bodyHtml: PlatformUtils.optionListMarkup(`audio_q_${index + 1}`, ExperimentConfig.task1.options),
                };
            })
        );

        PlatformUtils.renderSequence(
            container,
            pages,
            function () {
                window.location.href = ExperimentConfig.routes.surveyPostTask1;
            },
            { backgroundAudioId: "background-audio" }
        );
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visuospatial Illusion Task</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="task2">
    <main class="page-shell"><div id="page-container"></div></main>

    <audio id="background-audio" loop preload="auto">
        <source src="auditoryBeats/40HzBinauralBeats.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script src="experiment-config.js"></script>
    <script src="platform-utils.js"></script>
    <script>
        PlatformUtils.setPageData("task2");
        const container = document.getElementById("page-container");
        const introPage = {
            activeStage: "task2",
            mode: "manual",
            progressLabel: "Stage 6 of 8",
            eyebrow: "Task block 2",
            title: "Visuospatial illusion task under 40 Hz stimulation",
            subtitle: "The participant inspects each illusion image and reports whether the hidden target or pattern can be identified before the next item appears.",
            bodyHtml: PlatformUtils.infoCardsMarkup([
                { label: "Stimulation", value: "40 Hz binaural beat background audio." },
                { label: "Responses", value: "Select one of three outcome options for each illusion." },
                { label: "Visual focus", value: "The image remains dominant so the participant can inspect it without clutter." }
            ]),
            supportText: "Inspect each image carefully before the timer expires.",
            buttonLabel: "Begin Task Block 2"
        };

        const itemPages = ExperimentConfig.task2.imageItems.map(function (item, index) {
            return {
                activeStage: "task2",
                mode: "timed",
                timer: true,
                seconds: ExperimentConfig.timings.taskItemSeconds,
                progressLabel: `Stage 6 of 8 • Item ${index + 1} of ${ExperimentConfig.task2.imageItems.length}`,
                eyebrow: "Visuospatial illusion item",
                title: `Illusion image ${index + 1}`,
                subtitle: item.prompt,
                mediaHtml: PlatformUtils.buildTaskMediaImage(item.src, item.prompt),
                bodyHtml: PlatformUtils.optionListMarkup(
                    `image_q_${index + 1}`,
                    ExperimentConfig.task2.options,
                    "Use keys 1, 2, or 3 to respond."
                ),
                skipLabel: "Skip item"
            };
        });

        PlatformUtils.renderSequence(
            container,
            [introPage].concat(itemPages),
            function () {
                PlatformUtils.goToRoute("surveyPostTask2");
            },
            { backgroundAudioId: "background-audio" }
        );
    </script>
</body>
</html>

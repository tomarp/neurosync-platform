<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseline Recording</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="baseline">
    <main class="page-shell"><div id="page-container"></div></main>

    <script src="experiment-config.js"></script>
    <script src="platform-utils.js"></script>
    <script>
        PlatformUtils.setPageData("baseline");
        PlatformUtils.renderStagePage(
            document.getElementById("page-container"),
            {
                activeStage: "baseline",
                mode: "timed",
                timer: true,
                seconds: ExperimentConfig.timings.baselineSeconds,
                progressLabel: "Stage 3 of 8",
                eyebrow: "Baseline recording",
                title: "Eyes-open resting baseline",
                subtitle: "Keep your eyes open, remain still, and maintain attention on the fixation mark until the timer ends.",
                bodyHtml: `
                    <div class="focus-field focus-field--baseline">
                        <div class="fixation-mark" aria-hidden="true"></div>
                    </div>
                    ${PlatformUtils.infoCardsMarkup([
                        { label: "Posture", value: "Remain seated and stable." },
                        { label: "Attention", value: "Maintain a calm forward gaze." },
                        { label: "Data quality", value: "Minimize movement, speaking, and unnecessary blinking." }
                    ])}
                `,
                supportText: "This stage supports resting-state physiological acquisition before the task sequence begins.",
                skipLabel: "Skip baseline"
            },
            function () {
                PlatformUtils.goToRoute("task1");
            }
        );
    </script>
</body>
</html>

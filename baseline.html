<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseline Recording</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="baseline">
    <main class="page-shell">
        <section class="stage-card stage-card--timed">
            <p class="eyebrow">Stage 3</p>
            <h1>Eyes-Open Baseline</h1>
            <p class="stage-subtitle">
                Stay in a resting position while keeping your eyes open and body movement to a minimum.
            </p>
            <div id="timer-shell"></div>
        </section>
    </main>

    <script src="experiment-config.js"></script>
    <script src="platform-utils.js"></script>
    <script>
        PlatformUtils.setPageData("baseline");
        document.getElementById("timer-shell").innerHTML = PlatformUtils.timerMarkup();
        (function () {
            const timerText = document.querySelector("[data-timer-text]");
            const timerCircle = document.querySelector(".timer-circle");
            const seconds = ExperimentConfig.timings.baselineSeconds;
            const circumference = 2 * Math.PI * 66;
            timerCircle.style.strokeDasharray = `${circumference}`;
            timerCircle.style.strokeDashoffset = "0";
            let remaining = seconds;
            timerText.textContent = `${remaining}s`;
            const interval = window.setInterval(function () {
                remaining -= 1;
                timerText.textContent = `${Math.max(remaining, 0)}s`;
                timerCircle.style.strokeDashoffset = `${circumference * (1 - Math.max(remaining, 0) / seconds)}`;
                if (remaining <= 0) {
                    window.clearInterval(interval);
                    window.location.href = ExperimentConfig.routes.task1;
                }
            }, 1000);
        })();
    </script>
</body>
</html>
